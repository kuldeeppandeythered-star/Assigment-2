<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCER College - Admission</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}
header{
    background:#002b5b;
    color:white;
    padding:20px;
    text-align:center;
}
nav{
    background:#00509e;
    padding:10px;
    text-align:center;
}
nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}
.container{
    width:80%;
    margin:auto;
    margin-top:30px;
}
.card{
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
form input, form select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    background:#002b5b;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
    width:100%;
    font-size:16px;
}
footer{
    margin-top:40px;
    background:#002b5b;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>
<body>

<header>
<h1>UCER College</h1>
<p>Welcome to UCER Admission Portal</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Courses</a>
<a href="#">Admission</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<div class="card">
<h2>Admission Form</h2>
<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number" required>

<label>Select Course</label>
<select>
<option>B.Tech</option>
<option>BCA</option>
<option>BBA</option>
<option>MCA</option>
<option>MBA</option>
</select>

<label>12th Percentage</label>
<input type="number" placeholder="Enter percentage">

<button type="submit">Submit Admission Form</button>

</form>
</div>
</div>

<footer>
<p>© 2026 UCER College | All Rights Reserved</p>
</footer>

</body>
</html>
